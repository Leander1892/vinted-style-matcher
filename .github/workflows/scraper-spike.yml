name: Scraper feasibility spike

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run spike
        working-directory: scraper
        run: npm run spike
        continue-on-error: true

      - name: Commit spike log
        run: |
          git config user.name "scraper-spike-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scraper/spike-log.jsonl
          git diff --staged --quiet || git commit -m "Log spike run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
